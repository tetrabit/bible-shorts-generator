# Bible Shorts Generator Configuration

# Video Settings
video:
  width: 1080
  height: 1920
  fps: 30
  max_duration: 7
  backend: "wan"  # Alibaba Wan T2V text-to-video
  skip_subtitles: false  # set true to compose without subtitle overlay (debug video+audio only)
  format: "mp4"
  codec: "libx264"
  crf: 20
  preset: "fast"

# Text Settings
text:
  max_words: 18
  speaking_rate: 3.0  # words per second
  font_path: "/usr/share/fonts/truetype/dejavu/DejaVuSans-Bold.ttf"
  font_size: 72
  font_color: [255, 255, 255]  # White
  outline_color: [0, 0, 0]  # Black
  outline_width: 4
  shadow: true
  position: "bottom"  # center, top, bottom
  highlight_color: [255, 215, 0]  # Gold for current word
  padding_bottom: 150  # pixels from bottom
  max_chars_per_line: 30
  line_spacing: 20

# Bible Settings
bible:
  version: "KJV"  # King James Version
  books:
    - "Psalms"
    - "Proverbs"
    - "John"
    - "Matthew"
    - "Philippians"
    - "Romans"
  exclude_books: []
  min_words: 5
  max_words: 18

# AI Models
models:
  wan:
    repo_dir: "models/wan2.1"  # Wan T2V repository
    model_dir: "models/wan2.1-weights"  # Downloaded model weights
    size: "1.3B"  # Use "14B" only if you have a high-end GPU and matching weights
    max_duration: 5  # seconds
    resolution: "480*832"  # 1.3B supports 480*832 (vertical) or 832*480 (horizontal); 14B adds 720*1280/1280*720
    offload_model: true  # Memory optimization (recommended)
    sample_shift: 8
    sample_guide_scale: 6

  tts:
    engine: "piper"
    voice: "en_US-lessac-medium"
    sample_rate: 22050

  whisper:
    model_size: "base"  # tiny, base, small, medium, large
    device: "cpu"  # use CPU to avoid CUDA/cuDNN issues during alignment
    compute_type: "float32"

# YouTube Settings
youtube:
  category_id: "22"  # People & Blogs
  privacy: "public"  # public, private, unlisted
  tags:
    - "Bible"
    - "Verse"
    - "Shorts"
    - "Christian"
    - "Faith"
    - "Scripture"
    - "BibleVerse"
    - "DailyVerse"
    - "Inspiration"
  title_template: "{verse_ref} - {first_words}... #Shorts #BibleVerse"
  description_template: |
    {verse_text}

    📖 {verse_ref} ({bible_version})

    Follow for daily Bible verses!

    #BibleVerse #Scripture #Faith #Christian #Shorts #DailyVerse #Gospel #Jesus #God #Inspiration

  upload_schedule:
    enabled: true
    times:
      - "09:00"
      - "15:00"
      - "21:00"
    timezone: "America/New_York"

# Scheduling
scheduler:
  enabled: true
  generation_interval: "2h"  # Generate every 2 hours
  batch_size: 3  # Generate 3 videos per batch
  max_queue: 10  # Keep max 10 videos ready to upload

# Storage
storage:
  cleanup_after_upload: false  # Set to true to delete intermediate files
  keep_final_videos: true
  max_storage_gb: 50
  archive_uploaded: true

# Logging
logging:
  level: "INFO"  # DEBUG, INFO, WARNING, ERROR
  console: true
  file: true
  max_size_mb: 10
  backup_count: 5
